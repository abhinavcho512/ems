# ===== Database (Local MySQL) =====
spring.datasource.url=jdbc:mysql://localhost:3306/ems_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=abhinavch@512

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Server =====
server.port=8080

# ===== JWT (all 3 required) =====
app.jwt.secret=MySuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ===== CORS =====
app.cors.allowed-origins=http://localhost:5173

spring.main.allow-circular-references=true